apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lcp-dev
resources:
  - ../../k8s
images:
  - name: registry.example.com/lcp/lcp-server
    newName: your-registry.example.com/lcp-server
    newTag: dev
  - name: registry.example.com/lcp/lcp-server-core
    newName: your-registry.example.com/lcp-core
    newTag: dev
  - name: registry.example.com/lcp/lcp-admin-ui
    newName: your-registry.example.com/lcp-admin-ui
    newTag: dev
labels:
  - pairs:
      environment: dev
patches:
  - path: patch-configmap.yaml
  - path: patch-deployments.yaml
  - path: patch-ingress.yaml
  - path: patch-hpa.yaml
