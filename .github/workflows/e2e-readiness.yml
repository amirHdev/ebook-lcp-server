name: E2E Readiness

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build frontend image
        run: docker build -t ebook-lcp-admin-ui ./frontend

      - name: Run compose readiness flow
        run: sh scripts/e2e-readiness.sh

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-readiness-artifacts
          path: artifacts/e2e-readiness
